<style>
:root {

  --surface-2: #F2F0EA;
  --border: rgba(0,0,0,0.10);
  --border-strong: rgba(0,0,0,0.18);
  --text: #1F1F1D;
  --text-muted: #6E6E68;
  --text-faint: #95958E;
  --accent: #1F3A5F;
  --accent-hover: #2A4D7A;
  --info-bg: #E6F1FB;
  --info-text: #0C447C;
  --warm-bg: #FAEEDA;
  --warm-text: #633806;
  --warm-strong: #412402;
  --preload-bg: #FFF5DD;
  --preload-text: #6B4D0A;
  --preload-strong: #432F00;
  --rest-bg: #F1EFE8;
  --rest-text: #444441;
  --easy-bg: #E6F1FB;
  --easy-text: #0C447C;
  --hard-bg: #FAECE7;
  --hard-text: #712B13;
  --long-bg: #E8F5E9;
  --long-text: #1B5E20;
  --past-bg: #ECEAE3;
  --past-text: #6E6E68;
  --success-bg: #E6F4EA;
  --success-text: #1F6034;
  --error-bg: #FBEAEA;
  --error-text: #851515;
  --r-md: 8px;
  --r-lg: 12px;
  --pre-bg: #E3F2FD;
  --pre-text: #0D47A1;
  --pre-strong: #0A3A7E;
  --intra-bg: #FAEEDA;
  --intra-text: #633806;
  --intra-strong: #412402;
  --post-bg: #E8F5E9;
  --post-text: #2E7D32;
  --post-strong: #1B5E20;
}
@media (prefers-color-scheme: dark) {
  :root {
    color-scheme: dark;
    --bg: #1A1A1A;
    --surface: #242424;
    --surface-2: #2E2E2E;
    --border: rgba(255,255,255,0.10);
    --border-strong: rgba(255,255,255,0.18);
    --text: #E8E8E6;
    --text-muted: #A0A09A;
    --text-faint: #6E6E68;
    --accent: #6B9FD4;
    --accent-hover: #85B3E0;
    --info-bg: #1A2E42;
    --info-text: #7BB8E8;
    --warm-bg: #3A2A10;
    --warm-text: #E8C882;
    --warm-strong: #F0D8A0;
    --preload-bg: #332A10;
    --preload-text: #D4B65E;
    --preload-strong: #E8CC78;
    --rest-bg: #2A2A28;
    --rest-text: #B0B0AA;
    --easy-bg: #1A2E42;
    --easy-text: #7BB8E8;
    --hard-bg: #3A1E14;
    --hard-text: #E89878;
    --long-bg: #1A3322;
    --long-text: #68C080;
    --past-bg: #252523;
    --past-text: #888883;
    --success-bg: #1A3322;
    --success-text: #68C080;
    --error-bg: #3A1818;
    --error-text: #E88888;
    --pre-bg: #1A2E42;

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 15px; line-height: 1.55; -webkit-font-smoothing: antialiased; }
.wrap { max-width: 720px; margin: 0 auto; padding: 24px 20px 48px; }
h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; }
h2 { font-size: 18px; font-weight: 600; margin: 28px 0 12px; }
.subtle { color: var(--text-muted); font-size: 13px; }
.loading-msg { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 16px; }
.error-msg { text-align: center; padding: 40px 20px; color: var(--error-text); background: var(--error-bg); border-radius: var(--r-lg); margin: 20px 0; font-size: 14px; }

/* Metrics */
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin: 16px 0 0; }
.metric { background: var(--surface-2); border-radius: var(--r-md); padding: 12px 14px; }
.metric .lbl { font-size: 12px; color: var(--text-muted); margin: 0 0 4px; }
.metric .val { font-size: 20px; font-weight: 600; line-height: 1.1; margin: 0; }
.metric .unit { font-size: 12px; color: var(--text-muted); font-weight: 400; }

/* Calibration note */
.calib { background: var(--surface-2); border-radius: var(--r-md); padding: 12px 14px; margin: 16px 0 0; font-size: 13px; color: var(--text-muted); }
.calib b { font-weight: 500; color: var(--text); }
.calib code { background: rgba(128,128,128,0.15); padding: 1px 6px; border-radius: 4px; font-size: 12px; font-family: ui-monospace, "SF Mono", Menlo, monospace; }

/* Navigation */
.nav-bar { display: flex; gap: 8px; margin: 16px 0 0; }
.nav-btn { appearance: none; background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border); padding: 8px 14px; border-radius: var(--r-md); font: inherit; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.12s; }
.nav-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.nav-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Week nav */
.week-nav { display: flex; align-items: center; gap: 12px; margin: 16px 0 0; }
.week-nav button { appearance: none; background: var(--surface-2); color: var(--text); border: 1px solid var(--border); width: 36px; height: 36px; border-radius: var(--r-md); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
.week-nav button:hover { background: var(--accent); color: #fff; }
.week-label { font-size: 15px; font-weight: 500; flex: 1; text-align: center; }

/* Refresh bar */
.refresh-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--r-md); padding: 10px 14px; margin: 16px 0 0; }
.refresh-btn { appearance: none; background: var(--accent); color: #fff; border: 0; padding: 8px 14px; border-radius: var(--r-md); font: inherit; font-size: 14px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: background 0.12s, transform 0.05s; }
.refresh-btn:hover { background: var(--accent-hover); }
.refresh-btn:active { transform: scale(0.98); }
.refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.refresh-btn .icon { font-size: 13px; display: inline-block; }
.refresh-btn.loading .icon { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.refresh-status { font-size: 13px; color: var(--text-muted); flex: 1; min-width: 180px; }
.refresh-status.success { color: var(--success-text); }
.refresh-status.error { color: var(--error-text); }

/* Day cards */
.day { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--r-lg); padding: 16px 18px; margin-bottom: 12px; transition: border-color 0.2s; }
.day.today { border: 2px solid var(--accent); padding: 15px 17px; }
.day.past { background: var(--past-bg); opacity: 0.85; }
.day-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
.day-name { font-size: 16px; font-weight: 600; }
.day-date { font-size: 13px; color: var(--text-muted); }
.pill { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 999px; letter-spacing: 0.02em; }
.pill.today-pill { background: var(--accent); color: #fff; }
.pill.actual-pill { background: var(--success-bg); color: var(--success-text); }
.badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 999px; letter-spacing: 0.01em; }
.badge.rest { background: var(--rest-bg); color: var(--rest-text); }
.badge.easy { background: var(--easy-bg); color: var(--easy-text); }
.badge.hard { background: var(--hard-bg); color: var(--hard-text); }
.badge.long { background: var(--long-bg); color: var(--long-text); }
.session { font-size: 14px; color: var(--text); margin: 0 0 10px; }
.power-line { font-size: 13px; color: var(--info-text); background: var(--info-bg); padding: 6px 10px; border-radius: var(--r-md); margin: 0 0 10px; font-variant-numeric: tabular-nums; }

/* Macros */
.macro-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 8px 0 12px; }
.macro { background: var(--surface-2); border-radius: var(--r-md); padding: 8px 10px; }
.macro .m-lbl { font-size: 11px; color: var(--text-muted); margin: 0; }
.macro .m-val { font-size: 16px; font-weight: 600; margin: 0; line-height: 1.2; }
.macro .m-unit { font-size: 11px; color: var(--text-muted); font-weight: 400; }

/* Fuel protocol blocks */
.fuel-block { border-radius: var(--r-md); padding: 12px 14px; margin: 6px 0; }
.fuel-block.pre { background: var(--pre-bg); color: var(--pre-text); }
.fuel-block.intra { background: var(--intra-bg); color: var(--intra-text); }
.fuel-block.post { background: var(--post-bg); color: var(--post-text); }
.fuel-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 6px; }
.fuel-block.pre .fuel-label { color: var(--pre-strong); }
.fuel-block.intra .fuel-label { color: var(--intra-strong); }
.fuel-block.post .fuel-label { color: var(--post-strong); }
.fuel-macro { font-size: 14px; font-weight: 600; margin: 0 0 4px; }
.fuel-detail { font-size: 13px; line-height: 1.5; margin: 2px 0; }
.fuel-detail b { font-weight: 500; }

/* Preload */
.preload { background: var(--preload-bg); border-radius: var(--r-md); padding: 12px 14px; margin: 8px 0 0; color: var(--preload-text); border-left: 3px solid #D4A017; }

.preload ul { margin: 4px 0 0; padding-left: 18px; font-size: 14px; line-height: 1.55; }
.preload li { margin: 2px 0; }
.preload b { color: var(--preload-strong); font-weight: 500; }

/* Note */
.note { font-size: 13px; color: var(--text-muted); background: var(--surface-2); border-radius: var(--r-md); padding: 10px 12px; margin: 8px 0 0; }
.note b { color: var(--text); font-weight: 500; }

/* Settings panel */
.settings-panel { display: none; }
.settings-panel.active { display: block; }
.plan-panel { display: none; }
.plan-panel.active { display: block; }
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
.setting-field { display: flex; flex-direction: column; gap: 4px; }
.setting-field label { font-size: 13px; font-weight: 500; color: var(--text-muted); }
.setting-field input { appearance: none; background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--r-md); padding: 10px 12px; font: inherit; font-size: 15px; color: var(--text); width: 100%; }
.setting-field input:focus { outline: 2px solid var(--accent); border-color: transparent; }
.setting-field .hint { font-size: 11px; color: var(--text-faint); }
.settings-actions { display: flex; gap: 10px; margin: 16px 0; }
.settings-actions button { appearance: none; border: 0; padding: 10px 20px; border-radius: var(--r-md); font: inherit; font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-save { background: var(--accent); color: #fff; }
.btn-save:hover { background: var(--accent-hover); }
.btn-reset { background: var(--surface-2); color: var(--text-muted); }
.derived { background: var(--info-bg); color: var(--info-text); border-radius: var(--r-md); padding: 12px 14px; margin: 12px 0; font-size: 14px; }
.derived b { font-weight: 600; }

/* Footer */
.foot { margin-top: 24px; font-size: 13px; color: var(--text-muted); border-top: 0.5px solid var(--border); padding-top: 14px; }

/* Install prompt */
.install-bar { display: none; background: var(--info-bg); color: var(--info-text); border-radius: var(--r-md); padding: 10px 14px; margin: 12px 0 0; font-size: 13px; cursor: pointer; text-align: center; font-weight: 500; }
.install-bar:hover { opacity: 0.9; }

@media (max-width: 480px) {
  .macro-row { grid-template-columns: repeat(2, 1fr); }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .settings-grid { grid-template-columns: 1fr; }
  .wrap { padding: 16px 14px 40px; }
}

<body>
<div class="wrap" id="app">
  <div class="loading-msg" id="loading">Connecting to Intervals.icu…</div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  SETTINGS — localStorage persistence
// ════════════════════════════════════════════════════════════════
const DEFAULTS = {
  ftp: 321,
  weight: 81,
  bmr: 1825,
  neatMultiplier: 1.20,
  deficitPerDay: 270,
  proteinFloor: 160,
  proteinLongDay: 165,
};

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('fuelSettings'));
    if (s) return { ...DEFAULTS, ...s };
  } catch {}
  return { ...DEFAULTS };
}

function saveSettings(s) {
  localStorage.setItem('fuelSettings', JSON.stringify(s));
}

function getOffBikeBaseline(s) {
  return Math.round(s.bmr * s.neatMultiplier);
}

// ════════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════════
function fmt(n) { return Math.round(n).toLocaleString('en-US'); }

function todayISO() { return new Date().toISOString().slice(0, 10); }

function formatDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function formatDateLong(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}

function dayName(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long' });
}

// Get Monday of the week containing a date
function getMonday(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(d);
  mon.setDate(diff);
  return mon.toISOString().slice(0, 10);
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}

function weekDates(monday) {
  return Array.from({ length: 7 }, (_, i) => addDays(monday, i));
}

// ════════════════════════════════════════════════════════════════
//  NUTRITION ENGINE
//  Grounded in: Burke 2011, Jeukendrup 2014, Thomas 2016 ACSM,
//  Phillips & van Loon 2011, Sawka 2007, Stellingwerff/Impey
// ════════════════════════════════════════════════════════════════

// Classify session from event data
function classifySession(events) {
  if (!events || events.length === 0) return { type: 'rest', label: 'Rest', session: 'OFF — rest day', durationSec: 0, intensityFactor: 0 };

  // Take the primary cycling event
  const cycling = events.filter(e => {
    const cat = (e.category || '').toUpperCase();
    const type = (e.type || '').toUpperCase();
    return cat === 'RIDE' || cat === 'CYCLING' || cat === 'VIRTUALRIDE'
        || type === 'RIDE' || type === 'CYCLING' || type === 'VIRTUALRIDE';
  });

  if (cycling.length === 0) {
    // Check if it's a rest day note
    return { type: 'rest', label: 'Rest', session: 'OFF — rest day', durationSec: 0, intensityFactor: 0 };
  }

  // Sum durations if multiple rides
  const totalDur = cycling.reduce((s, e) => s + (e.movingTime || 0), 0);
  const hours = totalDur / 3600;
  const name = cycling.map(e => e.name).join(' + ');
  const nameLower = name.toLowerCase();

  // Get IF from event if available
  let intensityFactor = null;
  for (const e of cycling) {
    if (e.icu_intensity) { intensityFactor = e.icu_intensity; break; }
  }

  // Classify based on duration + name hints
  let type, label;

  if (hours >= 2.5) {
    type = 'long';
    label = hours >= 3.5 ? 'Long — big day' : 'Long';
  } else if (hours >= 1.5 && (nameLower.includes('z2') || nameLower.includes('endurance') || nameLower.includes('long'))) {
    type = 'long';
    label = 'Long';
  } else if (nameLower.includes('interval') || nameLower.includes('threshold') || nameLower.includes('vo2')
          || nameLower.includes('ftp') || nameLower.includes('race') || nameLower.includes('tempo')
          || nameLower.includes('sweet spot') || nameLower.includes('ss ')
          || (intensityFactor && intensityFactor > 0.82)) {
    type = 'hard';
    label = 'Hard';
  } else if (hours <= 1.0 || nameLower.includes('recovery') || nameLower.includes('easy')
          || (intensityFactor && intensityFactor < 0.60)) {
    type = 'easy';
    label = 'Easy';
  } else {
    type = 'hard';
    label = nameLower.includes('z2') ? 'Endurance' : 'Moderate';
  }

  // Default IF estimates if not provided by ICU
  if (!intensityFactor) {
    if (type === 'easy') intensityFactor = 0.55;
    else if (type === 'long') intensityFactor = 0.65;
    else intensityFactor = 0.78;
  }

  const session = name || `${label} ${hours.toFixed(1)} h`;

  return { type, label, session, durationSec: totalDur, intensityFactor };
}

// Compute daily macros
function computeDayMacros(rideKcal, durationSec, settings) {
  const baseline = getOffBikeBaseline(settings);
  const tdee = baseline + rideKcal;
  const intake = tdee - settings.deficitPerDay;
  const hours = durationSec / 3600;

  const protein = hours >= 3.5 ? settings.proteinLongDay : settings.proteinFloor;
  // Fat: ~20-22% of intake on ride days, ~25% on rest
  const fatPct = rideKcal > 0 ? 0.21 : 0.25;
  const fatKcal = intake * fatPct;
  const fat = Math.round(fatKcal / 9 / 5) * 5; // round to nearest 5

  const proteinKcal = protein * 4;
  const carbKcal = Math.max(0, intake - proteinKcal - fat * 9);
  const carbs = Math.round(carbKcal / 4 / 5) * 5; // round to nearest 5

  // Recalculate actual intake from rounded values
  const actualIntake = Math.round(carbs * 4 + protein * 4 + fat * 9);

  // Generate explanatory note for this day's macros
  const carbGkg = (carbs / settings.weight).toFixed(1);
  const protGkg = (protein / settings.weight).toFixed(1);
  const fatPctActual = Math.round(fat * 9 / actualIntake * 100);

  let macroWhy = `<b>Carbs ${carbGkg} g/kg:</b> Burke 2011 table — `;
  if (hours === 0) macroWhy += `rest/light day → 3–5 g/kg/d.`;
  else if (hours < 1.5) macroWhy += `moderate (~1h) → 5–7 g/kg/d.`;
  else if (hours < 3) macroWhy += `high (1–3h, mod intensity) → 6–10 g/kg/d.`;
  else macroWhy += `very high (&gt;3h) → 8–12 g/kg/d.`;
  macroWhy += ` Carbs are the adjustment lever in periodised nutrition (Stellingwerff/Burke "fuel for the work required").`;
  macroWhy += ` | <b>Protein ${protGkg} g/kg:</b> Phillips & van Loon 2011: 1.2–2.0 g/kg/d for athletes; upper end during deficit to preserve lean mass. Fixed at ${protein}g/day floor.`;
  macroWhy += ` | <b>Fat ${fatPctActual}%:</b> Thomas 2016 ACSM: minimum 20% of energy for hormonal health. Set to ~${Math.round(fatPct * 100)}% — not a performance lever, kept stable.`;

  return { kcal: actualIntake, carbs, protein, fat, tdee, intake: Math.round(intake), macroWhy };
}

// ────────────────────────────────────────────────────────────────
//  FUEL PROTOCOLS — Jeukendrup 2014 decision tree + Burke 2011
//  + Thomas 2016 ACSM + Sawka 2007 hydration
// ────────────────────────────────────────────────────────────────

function generatePreFuel(durationSec, weight) {
  const hours = durationSec / 3600;
  if (hours < 0.75) return null;

  let carbGkg;
  if (hours < 1.5) carbGkg = 0.5;
  else if (hours < 2.5) carbGkg = 0.8;
  else if (hours < 3.5) carbGkg = 1.0;
  else carbGkg = 1.2;

  const carbs = Math.round(carbGkg * weight);
  const protein = 5;
  const fat = 0;

  const why = [
    `<b>Carbs ${carbGkg.toFixed(1)} g/kg (${carbs}g):</b> Thomas 2016 ACSM recommends 1–4 g/kg 1–4h pre-exercise. At 30 min, dose is scaled to ${carbGkg.toFixed(1)} g/kg to allow gastric emptying before effort. Focus on quick-digesting CHO (glucose, sucrose, maltodextrin) — avoid fructose-only sources which empty slower (Jeukendrup & Gleeson, Sport Nutrition Ch. 8).`,
    `<b>Protein ~5g, fat 0g:</b> Both slow gastric emptying. At 30 min pre, keep minimal to reduce GI distress risk (Burke et al. 2011: pre-event meal should be "low fat, low fibre, moderate protein" — but at 30 min the window is too short for significant protein).`,
    `<b>Examples:</b> 1–2 gels, banana + honey, white bread + jam, rice cake + honey, dates. Avoid: oats, eggs, yogurt, anything with fat or fibre.`,
  ];

  return { carbs, protein, fat, timing: '30 min before', carbGkg: carbGkg.toFixed(1), why };
}

function generateIntraFuel(durationSec, weight) {
  const hours = durationSec / 3600;

  if (hours < 0.75) {
    return {
      rate: 0, total: 0, sodium: 0, fluid: 0,
      why: [`<b>No fueling needed.</b> Muscle glycogen stores (~400–500g when full) are sufficient for efforts under 45 min (Burke et al. 2011; Jeukendrup 2014 decision tree: events &lt;30 min → no CHO).`]
    };
  }
  if (hours < 1.25) {
    return {
      rate: 0, total: 0, sodium: 0, fluid: '400–600 ml/h',
      why: [
        `<b>Mouth rinse only.</b> Jeukendrup 2014 & Burke 2011: for 30–75 min sustained efforts, swirling a 4–6% CHO solution in the mouth for 5–10 sec improves performance ~2–3% via central/oropharyngeal pathways (Chambers et al. fMRI studies showed brain reward-centre activation). No need to swallow — substrate isn't the limiter at this duration.`,
        `<b>Fluid:</b> Sawka 2007 ACSM: 400–800 ml/h depending on sweat rate and conditions. Drink to thirst for short efforts.`
      ]
    };
  }

  let rate, sodium, fluid;
  const why = [];

  if (hours < 2) {
    rate = 30; sodium = '300–500'; fluid = '400–750';
    why.push(`<b>CHO rate: 30 g/h.</b> Burke et al. 2011 duration ladder: 1–2h events → 30–60 g/h. At the shorter end, 30 g/h is sufficient. Single-source CHO OK (glucose, maltodextrin, sucrose) — SGLT1 transporter handles up to ~60 g/h before saturation (Jeukendrup 2014).`);
  } else if (hours < 2.5) {
    rate = 60; sodium = '500–700'; fluid = '500–750';
    why.push(`<b>CHO rate: 60 g/h.</b> Burke et al. 2011: 2–3h events → up to 60 g/h. This is the practical ceiling for single-source CHO — the intestinal SGLT1 glucose transporter saturates at ~1.0–1.1 g/min (Jeukendrup 2014). Above 60 g/h with single-source, unabsorbed CHO draws water into the gut lumen → GI distress. Consider multi-transportable (2:1 glu:fru) if gut tolerates it.`);
  } else if (hours < 3.5) {
    rate = 80; sodium = '500–700'; fluid = '600–800';
    why.push(`<b>CHO rate: 80 g/h.</b> Jeukendrup 2014 decision tree: events &gt;2.5h → 60–90 g/h with multi-transportable CHO required. Fructose is absorbed via the GLUT5 transporter (independent of SGLT1), raising total absorption capacity to ~1.5–1.75 g/min. Use 2:1 glucose:fructose ratio. Cermak & van Loon 2013 meta-analysis: CHO during exercise improves TT performance ~2%.`);
  } else {
    rate = 90; sodium = '600–800'; fluid = '≥750';
    why.push(`<b>CHO rate: 90 g/h (push to 100–120 if gut-trained).</b> Jeukendrup 2014: gut-trained athletes can achieve absorption rates of 1.75 g/min (105 g/h) vs untrained ~1.1 g/min. Gut training is a 4–6 week protocol of progressively higher CHO on long rides — it upregulates SGLT1/GLUT5 transporters and speeds gastric emptying. Multi-transportable CHO required (2:1 glu:fru).`);
  }

  why.push(`<b>Sodium: ${sodium} mg/L.</b> Sawka 2007 ACSM position stand: 300–700 mg/L for events &gt;2h. Replaces sweat sodium losses (typical sweat [Na+] = 20–80 mmol/L). Prevents exercise-associated hyponatraemia (EAH) and aids fluid absorption.`);
  why.push(`<b>Fluid: ${fluid} ml/h.</b> Sawka 2007: target ≤2% body mass loss. Typical range 400–800 ml/h; higher in heat. Gastric emptying tops out at ~1.0–1.2 L/h.`);
  why.push(`<b>Timing:</b> Start eating from min 20–30. Eat every 20–30 min to maintain steady exogenous CHO oxidation. Don't wait until you feel depleted — by then glycogen is already compromised (Hawley & Leckey 2015).`);

  const fuelingHours = Math.max(0, hours - 0.5);
  const total = Math.round(rate * fuelingHours);

  return { rate, total, sodium: `${sodium} mg/L`, fluid: `${fluid} ml/h`, why };
}

function generatePostFuel(durationSec, weight, intensityFactor) {
  const hours = durationSec / 3600;
  if (hours < 0.75) return null;

  const proteinGkg = 0.3;
  const protein = Math.round(proteinGkg * weight);
  let carbGkg;
  if (hours < 1.5) carbGkg = 0.8;
  else if (hours < 2.5) carbGkg = 1.0;
  else carbGkg = 1.2;

  if (intensityFactor > 0.80) carbGkg = Math.min(1.2, carbGkg + 0.1);

  const carbs = Math.round(carbGkg * weight);

  const why = [
    `<b>Carbs ${carbGkg.toFixed(1)} g/kg (${carbs}g):</b> Burke et al. 2011 recovery protocol: 1.0–1.2 g/kg/h for the first 4h when next session is &lt;8h away. ${hours >= 2.5 ? 'After ' + hours.toFixed(1) + 'h, glycogen is heavily depleted — the recovery window matters most here.' : 'Even with a longer turnaround, early refueling accelerates glycogen resynthesis.'} Glycogen synthase is most active immediately post-exercise (Ivy et al. 1988).`,
    `<b>Protein ${proteinGkg} g/kg (${protein}g):</b> Phillips & van Loon 2011: 0.3 g/kg per meal maximally stimulates muscle protein synthesis (MPS) via the leucine/mTORC1 pathway. Each dose needs ~2.5–3g leucine — achievable from 25–30g whey or 35–50g plant protein. Co-ingesting protein with CHO also modestly improves glycogen resynthesis when CHO is sub-optimal (Burke 2011).`,
    `<b>Timing: within 30–60 min.</b> Thomas 2016 ACSM: post-exercise protein + CHO within the first hour. MPS response is elevated for ~24h post-exercise, but the immediate window is when glycogen synthase activity peaks and the muscle is most insulin-sensitive.`,
  ];

  if (hours >= 2.5) {
    why.push(`<b>Appetite note:</b> Prolonged exercise often suppresses appetite (exercise-induced anorexia). If you can't face solid food, start with liquid: chocolate milk, smoothie, or recovery shake. Follow with a real meal within 90 min. Don't skip — tomorrow's session pulls from today's recovery.`);
  }
  why.push(`<b>Examples:</b> 500ml chocolate milk + scoop whey + banana + dried fruit. Or recovery shake + rice cake + honey.`);

  return { carbs, protein, timing: 'Within 30–60 min', carbGkg: carbGkg.toFixed(1), why };
}

function generatePreload(tomorrowClassified, dayOfWeek) {
  if (!tomorrowClassified || tomorrowClassified.type === 'rest') return null;

  const hours = tomorrowClassified.durationSec / 3600;
  const items = [];

  if (tomorrowClassified.type === 'long' || hours >= 2.5) {
    items.push('<b>Why preload:</b> Glycogen replenishment takes 24–48h (Burke 2011). Tonight\'s dinner partly fuels tomorrow\'s ride — the "fuel for the work required" model (Stellingwerff/Burke/Impey 2018).');
    items.push('Dinner should be carb-forward, low fibre, moderate protein, low fat. Thomas 2016 ACSM: pre-event meal = low fat, low fibre, familiar foods. No creamy pasta, fried food, or high-fibre legume bowls.');
    if (hours >= 3.5) {
      items.push('If craving 2nd dinner / late snack: white rice + honey, sourdough + jam, or banana + cereal. Aim for an extra 60–80 g carb. Burke 2011: 24–36h at 10–12 g/kg/d maximises glycogen for events &gt;90 min.');
    }
    items.push('Salt dinner generously if tomorrow is long or hot — Sawka 2007: pre-exercise sodium loading improves fluid retention and reduces hyponatraemia risk.');
    items.push('Prep bottles + bars + breakfast before bed. Lights out early.');
  } else if (tomorrowClassified.type === 'hard') {
    items.push('<b>Why preload:</b> Burke 2011 periodised model — high-intensity sessions need high CHO availability to be productive. Glycogen-depleted threshold work = junk training.');
    items.push('Dinner carb-forward to top up glycogen. Don\'t add extra fat or fibre late.');
    items.push('If hungry before bed: carbs > protein at this point (honey, toast, banana). Van Loon: pre-sleep casein (30–40g) supports overnight MPS if you want protein too.');
  } else {
    items.push('Normal dinner. Hydrate to pale urine before bed.');
  }

  const label = `Tomorrow preload · ${dayOfWeek} = ${tomorrowClassified.session}`;
  return { label, items };
}

// ════════════════════════════════════════════════════════════════
//  DATA FETCHING
// ════════════════════════════════════════════════════════════════
let currentMonday = getMonday(todayISO());
let cachedData = {};

async function fetchWeekData(monday) {
  const sunday = addDays(monday, 6);
  const key = monday;
  if (cachedData[key]) return cachedData[key];
  const resp = await fetch(`/api/intervals?oldest=${monday}&newest=${sunday}`);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${resp.status}`);
  }
  const data = await resp.json();
  cachedData[key] = data;
  return data;
}

// ════════════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════════════
let activeView = 'plan';

function renderApp() {
  if (activeView === 'settings') renderSettings();
  else loadAndRenderPlan();
}

async function loadAndRenderPlan() {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading-msg">Loading from Intervals.icu…</div>';
  try {
    const data = await fetchWeekData(currentMonday);
    renderPlan(data);
  } catch (e) {
    app.innerHTML = `${renderHeader()}<div class="error-msg"><b>Could not load data from Intervals.icu.</b><br>${e.message}<br><br>Check your API key in Vercel environment variables.</div>`;
  }
}

function renderHeader() {
  return `<header>
    <h1>Fuel Plan</h1>
    <p class="subtle">Auto-generated from Intervals.icu · powered by research</p>
    <div class="nav-bar">
      <button class="nav-btn ${activeView === 'plan' ? 'active' : ''}" onclick="switchView('plan')">Plan</button>
      <button class="nav-btn ${activeView === 'settings' ? 'active' : ''}" onclick="switchView('settings')">Settings</button>
    </div>
  </header>`;
}

function renderPlan(data) {
  const app = document.getElementById('app');
  const settings = loadSettings();
  const baseline = getOffBikeBaseline(settings);
  const today = todayISO();
  const dates = weekDates(currentMonday);
  const sunday = dates[6];

  const days = [];
  for (let i = 0; i < 7; i++) {
    const date = dates[i];
    const evts = data.events ? data.events[date] : null;
    const acts = data.activities ? data.activities[date] : null;
    const hasActual = acts && acts.totalEnergy > 0;
    const classified = classifySession(evts ? evts : []);

    let rideKcal, avgWatts, durationSec, source;
    if (hasActual) {
      rideKcal = acts.totalEnergy;
      avgWatts = acts.avgWatts;
      durationSec = acts.totalTime;
      source = 'actual';
    } else if (classified.durationSec > 0) {
      durationSec = classified.durationSec;
      avgWatts = Math.round(classified.intensityFactor * settings.ftp);
      rideKcal = Math.round(avgWatts * durationSec / 1000);
      source = 'estimate';
      if (evts) {
        const totalJoules = evts.reduce((s, e) => s + (e.joules || 0), 0);
        if (totalJoules > 0) { rideKcal = Math.round(totalJoules / 1000); source = 'planned'; }
      }
    } else {
      rideKcal = 0; avgWatts = 0; durationSec = 0; source = 'none';
    }

    const macros = computeDayMacros(rideKcal, durationSec, settings);
    days.push({ date, classified, rideKcal, avgWatts, durationSec, source, macros, hasActual, evts, acts });
  }

  let totalHours = days.reduce((s, d) => s + d.durationSec / 3600, 0);
  let totalKcal = days.reduce((s, d) => s + d.macros.kcal, 0);
  let avgKcal = Math.round(totalKcal / 7);
  const thisMonday = getMonday(todayISO());

  let html = renderHeader();

  html += `<div class="week-nav">
    <button onclick="changeWeek(-1)">‹</button>
    <span class="week-label">${formatDateLong(currentMonday)} — ${formatDateLong(sunday)}${currentMonday === thisMonday ? ' · this week' : ''}</span>
    <button onclick="changeWeek(1)">›</button>
  </div>`;

  html += `<div class="metrics">
    <div class="metric"><p class="lbl">FTP</p><p class="val">${settings.ftp}<span class="unit"> W</span></p></div>
    <div class="metric"><p class="lbl">Daily kcal avg</p><p class="val">${fmt(avgKcal)}<span class="unit"> kcal</span></p></div>
    <div class="metric"><p class="lbl">Protein floor</p><p class="val">${settings.proteinFloor}<span class="unit"> g/day</span></p></div>
    <div class="metric"><p class="lbl">Working weight</p><p class="val">${settings.weight}<span class="unit"> kg</span></p></div>
    <div class="metric"><p class="lbl">Cycling load</p><p class="val">${totalHours.toFixed(1)}<span class="unit"> hr</span></p></div>
    <div class="metric"><p class="lbl">Off-bike baseline</p><p class="val">${fmt(baseline)}<span class="unit"> kcal</span></p></div>
  </div>`;

  html += `<div class="calib">
    <b>Auto-generated from Intervals.icu.</b> Each ride is costed: <code>ride_kcal = avg_power × duration_s ÷ 1000</code>.
    Completed rides use actual data; upcoming rides use planned workouts. Deficit target: ~${settings.deficitPerDay} kcal/day.
    Carbs are the adjustment lever — protein (${settings.proteinFloor}g) and fat stay fixed.
    Fuel protocols follow Jeukendrup 2014 / Burke 2011 / Thomas 2016 ACSM.
  </div>`;

  html += `<div class="refresh-bar">
    <button class="refresh-btn" id="icu-btn" onclick="refreshData()" type="button"><span class="icon">↻</span> Refresh</button>
    <span class="refresh-status" id="icu-status">Data auto-loaded from Intervals.icu.</span>
  </div>`;

  html += `<div class="install-bar" id="install-bar" onclick="installPWA()">Install on home screen</div>`;
  html += `<h2>Day-by-day</h2>`;

  days.forEach((day, idx) => {
    const isPast = day.date < today;
    const isToday = day.date === today;
    const c = day.classified;
    const hours = day.durationSec / 3600;

    let classes = 'day';
    if (isPast) classes += ' past';
    if (isToday) classes += ' today';

    html += `<article class="${classes}" data-date="${day.date}">`;
    html += `<div class="day-head">`;
    html += `<span class="day-name">${dayName(day.date)}</span>`;
    html += `<span class="day-date">${formatDate(day.date)}</span>`;
    html += `<span class="badge ${c.type}">${c.label}</span>`;
    if (isToday) html += `<span class="pill today-pill">TODAY</span>`;
    if (day.hasActual) html += `<span class="pill actual-pill">✓ actual</span>`;
    html += `</div>`;

    html += `<p class="session">${c.session}${hours > 0 ? ' · ' + hours.toFixed(1) + ' h' : ''}</p>`;

    if (day.rideKcal > 0) {
      const deficit = day.macros.tdee - day.macros.kcal;
      const isActual = day.source === 'actual';
      const sourceLabel = isActual ? 'Intervals.icu' : (day.source === 'planned' ? 'Planned' : 'Estimate');
      let powerText = `${sourceLabel}: `;
      if (day.avgWatts) powerText += `${day.avgWatts} W avg × ${fmt(day.durationSec)} s ÷ 1000 = `;
      powerText += `<b>${fmt(day.rideKcal)} kcal ride</b> · TDEE ${fmt(day.macros.tdee)} · Eat ${fmt(day.macros.kcal)} (~${fmt(deficit)} kcal deficit)`;
      html += `<p class="power-line${isActual ? ' actual' : ''}">${powerText}</p>`;
    }

    const mc = day.macros;
    html += `<div class="macro-row">`;
    html += `<div class="macro"><p class="m-lbl">kcal</p><p class="m-val">${fmt(mc.kcal)}</p></div>`;
    html += `<div class="macro"><p class="m-lbl">Carbs</p><p class="m-val">${fmt(mc.carbs)}<span class="m-unit"> g</span></p></div>`;
    html += `<div class="macro"><p class="m-lbl">Protein</p><p class="m-val">${fmt(mc.protein)}<span class="m-unit"> g</span></p></div>`;
    html += `<div class="macro"><p class="m-lbl">Fat</p><p class="m-val">${fmt(mc.fat)}<span class="m-unit"> g</span></p></div>`;
    html += `</div>`;
    if (mc.macroWhy) {
      html += `<div class="note"><p style="margin:0;font-size:12px;line-height:1.5">${mc.macroWhy}</p></div>`;
    }

    if (hours >= 0.75) {
      const pre = generatePreFuel(day.durationSec, settings.weight);
      if (pre) {
        html += `<div class="fuel-block pre">`;
        html += `<p class="fuel-label">Pre-workout · ${pre.timing}</p>`;
        html += `<p class="fuel-macro">${pre.carbs} g C · ${pre.protein} g P · ${pre.fat} g F</p>`;
        pre.why.forEach(w => html += `<p class="fuel-detail">${w}</p>`);
        html += `</div>`;
      }

      const intra = generateIntraFuel(day.durationSec, settings.weight);
      html += `<div class="fuel-block intra">`;
      html += `<p class="fuel-label">During workout${intra.rate > 0 ? ' · ' + intra.rate + ' g/h target' : ''}</p>`;
      if (intra.total > 0) {
        html += `<p class="fuel-macro">~${intra.total} g CHO total · ${intra.sodium} sodium · ${intra.fluid} fluid</p>`;
      }
      intra.why.forEach(w => html += `<p class="fuel-detail">${w}</p>`);
      html += `</div>`;

      const post = generatePostFuel(day.durationSec, settings.weight, day.classified.intensityFactor);
      if (post) {
        html += `<div class="fuel-block post">`;
        html += `<p class="fuel-label">Post-workout · ${post.timing}</p>`;
        html += `<p class="fuel-macro">${post.carbs} g C (${post.carbGkg} g/kg) · ${post.protein} g P (0.3 g/kg)</p>`;
        post.why.forEach(w => html += `<p class="fuel-detail">${w}</p>`);
        html += `</div>`;
      }
    }

    const nextDay = idx < 6 ? days[idx + 1] : null;
    if (nextDay) {
      const nextDayName = dayName(nextDay.date);
      const preload = generatePreload(nextDay.classified, nextDayName);
      if (preload) {
        html += `<div class="preload"><p class="preload-title">${preload.label}</p><ul>`;
        preload.items.forEach(item => html += `<li>${item}</li>`);
        html += `</ul></div>`;
      }
    }

    html += `</article>`;
  });

  html += `<div class="foot">
    <p style="margin:0"><b>Troubleshooting:</b> Dragging mid-week → add 200 kcal/day (carbs). Weight stalling → pull rest-day carbs by 50g.
    Tracking weighs on mood → simplify to protein + ride fuel only. Sick → pause deficit, eat maintenance.</p>
  </div>`;

  app.innerHTML = html;

  const todayCard = document.querySelector('.day.today');
  if (todayCard) setTimeout(() => todayCard.scrollIntoView({ behavior: 'smooth', block: 'start' }), 300);
}

// ════════════════════════════════════════════════════════════════
//  SETTINGS VIEW
// ════════════════════════════════════════════════════════════════
function renderSettings() {
  const app = document.getElementById('app');
  const s = loadSettings();
  const baseline = getOffBikeBaseline(s);

  let html = renderHeader();
  html += `<h2>Settings</h2>`;
  html += `<p class="subtle">These values drive all macro and fuel calculations. Stored in your browser.</p>`;

  html += `<div class="settings-grid">
    <div class="setting-field"><label>FTP (W)</label><input type="number" id="s-ftp" value="${s.ftp}" step="1"><span class="hint">Functional threshold power</span></div>
    <div class="setting-field"><label>Weight (kg)</label><input type="number" id="s-weight" value="${s.weight}" step="0.5"><span class="hint">Working bodyweight</span></div>
    <div class="setting-field"><label>BMR (kcal/day)</label><input type="number" id="s-bmr" value="${s.bmr}" step="5"><span class="hint">Basal metabolic rate</span></div>
    <div class="setting-field"><label>NEAT multiplier</label><input type="number" id="s-neat" value="${s.neatMultiplier}" step="0.05" min="1.0" max="1.6"><span class="hint">Off-bike activity factor (1.10–1.40)</span></div>
    <div class="setting-field"><label>Daily deficit (kcal)</label><input type="number" id="s-deficit" value="${s.deficitPerDay}" step="10"><span class="hint">Target daily deficit. 270 = ~0.25 kg/wk</span></div>
    <div class="setting-field"><label>Protein floor (g/day)</label><input type="number" id="s-protein" value="${s.proteinFloor}" step="5"><span class="hint">Min daily protein (~2 g/kg during deficit)</span></div>
    <div class="setting-field"><label>Protein long day (g)</label><input type="number" id="s-proteinLong" value="${s.proteinLongDay}" step="5"><span class="hint">Protein on 3.5h+ ride days</span></div>
  </div>`;

  html += `<div class="derived">
    <b>Derived values:</b><br>
    Off-bike baseline = BMR × NEAT = ${fmt(s.bmr)} × ${s.neatMultiplier} = <b>${fmt(baseline)} kcal/day</b><br>
    TDEE on ride days = ${fmt(baseline)} + ride_kcal<br>
    Protein per kg = ${(s.proteinFloor / s.weight).toFixed(2)} g/kg/d
  </div>`;

  html += `<div class="settings-actions">
    <button class="btn-save" onclick="saveSettingsFromForm()">Save</button>
    <button class="btn-reset" onclick="resetSettings()">Reset to defaults</button>
  </div>`;

  html += `<div class="calib" style="margin-top:20px">
    <b>Research basis:</b> TDEE formula follows power-based costing (kJ = kcal at ~22–25% gross efficiency).
    Protein per Phillips & van Loon 2011: 1.2–2.0 g/kg/d, 0.3 g/kg per meal, 4–5 meals/day.
    Carb periodization per Burke 2011 / Stellingwerff: fuel for the work required.
    Deficit of ~270 kcal/day targets ~0.25 kg/week fat loss while preserving lean mass.
  </div>`;

  app.innerHTML = html;
}

function saveSettingsFromForm() {
  const s = {
    ftp: parseInt(document.getElementById('s-ftp').value) || DEFAULTS.ftp,
    weight: parseFloat(document.getElementById('s-weight').value) || DEFAULTS.weight,
    bmr: parseInt(document.getElementById('s-bmr').value) || DEFAULTS.bmr,
    neatMultiplier: parseFloat(document.getElementById('s-neat').value) || DEFAULTS.neatMultiplier,
    deficitPerDay: parseInt(document.getElementById('s-deficit').value) || DEFAULTS.deficitPerDay,
    proteinFloor: parseInt(document.getElementById('s-protein').value) || DEFAULTS.proteinFloor,
    proteinLongDay: parseInt(document.getElementById('s-proteinLong').value) || DEFAULTS.proteinLongDay,
  };
  saveSettings(s);
  cachedData = {};
  switchView('plan');
}

function resetSettings() {
  localStorage.removeItem('fuelSettings');
  renderSettings();
}

// ════════════════════════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════════════════════════
function switchView(view) { activeView = view; renderApp(); }
function changeWeek(delta) { currentMonday = addDays(currentMonday, delta * 7); loadAndRenderPlan(); }
function refreshData() { delete cachedData[currentMonday]; loadAndRenderPlan(); }

// ════════════════════════════════════════════════════════════════
//  PWA Install
// ════════════════════════════════════════════════════════════════
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  const bar = document.getElementById('install-bar');
  if (bar) bar.style.display = 'block';
});
function installPWA() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then(() => { deferredInstallPrompt = null; const bar = document.getElementById('install-bar'); if (bar) bar.style.display = 'none'; });
}

renderApp();
