.btn-save { background: var(--accent); color: #fff; }

/* Footer */

/* Install prompt */

@media (max-width: 480px) {

<body>
<div class="wrap" id="app">
  <div class="loading-msg" id="loading">Connecting to Intervals.icu…</div>
</div>

<script>
const DEFAULTS = {
  ftp: 321,
  weight: 81,
  bmr: 1825,
  neatMultiplier: 1.20,
  deficitPerDay: 270,
  proteinFloor: 160,
  proteinLongDay: 165,
  variabilityIndex: 1.18,
  preWorkoutMins: 60,
};

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('fuelSettings'));
    if (s) return { ...DEFAULTS, ...s };
  } catch {}
  return { ...DEFAULTS };
}

function saveSettings(s) {
  localStorage.setItem('fuelSettings', JSON.stringify(s));
}

function getOffBikeBaseline(s) {
  return Math.round(s.bmr * s.neatMultiplier);
}

// ════════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════════
function fmt(n) { return Math.round(n).toLocaleString('en-US'); }

function todayISO() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

function formatDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function formatDateLong(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}

function dayName(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long' });
}

// Get Monday of the week containing a date
function getMonday(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(d);
  mon.setDate(diff);
  return mon.toISOString().slice(0, 10);
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}

function weekDates(monday) {
  return Array.from({ length: 7 }, (_, i) => addDays(monday, i));
}

// ════════════════════════════════════════════════════════════════
//  NUTRITION ENGINE
//  Grounded in: Burke 2011, Jeukendrup 2014, Thomas 2016 ACSM,
//  Phillips & van Loon 2011, Sawka 2007, Stellingwerff/Impey
// ════════════════════════════════════════════════════════════════

// Classify session from event data
function classifySession(events) {
  if (!events || events.length === 0) return { type: 'rest', label: 'Rest', session: 'OFF — rest day', durationSec: 0, intensityFactor: 0 };

  // Take the primary cycling event
  const cycling = events.filter(e => {
    const cat = (e.category || '').toUpperCase();
    const type = (e.type || '').toUpperCase();
    return cat === 'RIDE' || cat === 'CYCLING' || cat === 'VIRTUALRIDE'
        || type === 'RIDE' || type === 'CYCLING' || type === 'VIRTUALRIDE';
  });

  if (cycling.length === 0) {
    // Check if it's a rest day note
    return { type: 'rest', label: 'Rest', session: 'OFF — rest day', durationSec: 0, intensityFactor: 0 };
  }

  // Sum durations if multiple rides
  const totalDur = cycling.reduce((s, e) => s + (e.movingTime || 0), 0);
  const hours = totalDur / 3600;
  const name = cycling.map(e => e.name).join(' + ');
  const nameLower = name.toLowerCase();

  // Get IF from event if available
  let intensityFactor = null;
  for (const e of cycling) {
    if (e.icu_intensity) { intensityFactor = e.icu_intensity; break; }
  }

  // Classify based on duration + name hints
  let type, label;

  if (hours >= 2.5) {
    type = 'long';
    label = hours >= 3.5 ? 'Long — big day' : 'Long';
  } else if (hours >= 1.5 && (nameLower.includes('z2') || nameLower.includes('endurance') || nameLower.includes('long'))) {
    type = 'long';
    label = 'Long';
  } else if (nameLower.includes('interval') || nameLower.includes('threshold') || nameLower.includes('vo2')
          || nameLower.includes('ftp') || nameLower.includes('race') || nameLower.includes('tempo')
          || nameLower.includes('sweet spot') || nameLower.includes('ss ')
          || (intensityFactor && intensityFactor > 0.82)) {
    type = 'hard';
    label = 'Hard';
  } else if (hours <= 1.0 || nameLower.includes('recovery') || nameLower.includes('easy')
          || (intensityFactor && intensityFactor < 0.60)) {
    type = 'easy';
    label = 'Easy';
  } else {
    type = 'hard';
    label = nameLower.includes('z2') ? 'Endurance' : 'Moderate';
  }

  // Default IF estimates if not provided by ICU
  if (!intensityFactor) {
    if (type === 'easy') intensityFactor = 0.55;
    else if (type === 'long') intensityFactor = 0.65;
    else intensityFactor = 0.78;
  }

  const session = name || `${label} ${hours.toFixed(1)} h`;

  return { type, label, session, durationSec: totalDur, intensityFactor };
}

// Classify from completed activity data (when events may no longer exist)
function classifyFromActivity(acts, settings) {
  const totalDur = acts.totalTime || 0;
  const hours = totalDur / 3600;
  const rides = acts.rides || [];
  const name = rides.map(r => r.name).join(' + ');
  const nameLower = name.toLowerCase();

  // Get IF from actual data
  let intensityFactor = null;
  for (const r of rides) {
    if (r.icu_intensity) { intensityFactor = r.icu_intensity; break; }
  }
  // Estimate IF from avg power if not available
  if (!intensityFactor && acts.avgWatts && settings.ftp) {
    intensityFactor = (acts.avgWatts * (settings.variabilityIndex || 1.18)) / settings.ftp;
  }

  let type, label;

  if (hours >= 2.5) {
    type = 'long';
    label = hours >= 3.5 ? 'Long — big day' : 'Long';
  } else if (hours >= 1.5 && (nameLower.includes('z2') || nameLower.includes('endurance') || nameLower.includes('long'))) {
    type = 'long';
    label = 'Long';
  } else if (nameLower.includes('interval') || nameLower.includes('threshold') || nameLower.includes('vo2')
          || nameLower.includes('ftp') || nameLower.includes('race') || nameLower.includes('tempo')
          || nameLower.includes('sweet spot') || nameLower.includes('ss ')
          || (intensityFactor && intensityFactor > 0.82)) {
    type = 'hard';
    label = 'Hard';
  } else if (hours <= 1.0 || nameLower.includes('recovery') || nameLower.includes('easy')
          || (intensityFactor && intensityFactor < 0.60)) {
    type = 'easy';
    label = 'Easy';
  } else {
    type = 'hard';
    label = nameLower.includes('z2') ? 'Endurance' : 'Moderate';
  }

  if (!intensityFactor) {
    if (type === 'easy') intensityFactor = 0.55;
    else if (type === 'long') intensityFactor = 0.65;
    else intensityFactor = 0.78;
  }

  const session = name || `${label} ${hours.toFixed(1)} h`;
  return { type, label, session, durationSec: totalDur, intensityFactor };
}

// Compute daily macros
function computeDayMacros(rideKcal, durationSec, settings) {
  const baseline = getOffBikeBaseline(settings);
  const tdee = baseline + rideKcal;
  const intake = tdee - settings.deficitPerDay;
  const hours = durationSec / 3600;

  const protein = hours >= 3.5 ? settings.proteinLongDay : settings.proteinFloor;
  // Fat: ~20-22% of intake on ride days, ~25% on rest
  const fatPct = rideKcal > 0 ? 0.21 : 0.25;
  const fatKcal = intake * fatPct;
  const fat = Math.round(fatKcal / 9 / 5) * 5; // round to nearest 5

  const proteinKcal = protein * 4;
  const carbKcal = Math.max(0, intake - proteinKcal - fat * 9);
  const carbs = Math.round(carbKcal / 4 / 5) * 5; // round to nearest 5

  // Recalculate actual intake from rounded values
  const actualIntake = Math.round(carbs * 4 + protein * 4 + fat * 9);

  // Generate explanatory note for this day's macros
  const carbGkg = (carbs / settings.weight).toFixed(1);
  const protGkg = (protein / settings.weight).toFixed(1);
  const fatPctActual = Math.round(fat * 9 / actualIntake * 100);

  let macroWhy = `<b>Carbs ${carbGkg} g/kg:</b> Burke 2011 table — `;
  if (hours === 0) macroWhy += `rest/light day → 3–5 g/kg/d.`;
  else if (hours < 1.5) macroWhy += `moderate (~1h) → 5–7 g/kg/d.`;
  else if (hours < 3) macroWhy += `high (1–3h, mod intensity) → 6–10 g/kg/d.`;
  else macroWhy += `very high (&gt;3h) → 8–12 g/kg/d.`;
  macroWhy += ` Carbs are the adjustment lever in periodised nutrition (Stellingwerff/Burke "fuel for the work required").`;
  macroWhy += ` | <b>Protein ${protGkg} g/kg:</b> Phillips & van Loon 2011: 1.2–2.0 g/kg/d for athletes; upper end during deficit to preserve lean mass. Fixed at ${protein}g/day floor.`;
  macroWhy += ` | <b>Fat ${fatPctActual}%:</b> Thomas 2016 ACSM: minimum 20% of energy for hormonal health. Set to ~${Math.round(fatPct * 100)}% — not a performance lever, kept stable.`;

  return { kcal: actualIntake, carbs, protein, fat, tdee, intake: Math.round(intake), macroWhy };
}

// ────────────────────────────────────────────────────────────────
//  FUEL PROTOCOLS — Jeukendrup 2014 decision tree + Burke 2011
//  + Thomas 2016 ACSM + Sawka 2007 hydration
// ────────────────────────────────────────────────────────────────

function generatePreFuel(durationSec, weight, intensityFactor, preWorkoutMins) {
  const hours = durationSec / 3600;
  if (hours < 0.75) return null;

  const band = getIntensityBand(intensityFactor || 0);
  const ifDisplay = intensityFactor ? intensityFactor.toFixed(2) : '?';
  const leadMins = preWorkoutMins || 60;
  const leadHrs = leadMins / 60;
  const leadLabel = leadMins >= 60 ? `${leadHrs}h before` : `${leadMins} min before`;

  // ── Train-low option: easy sessions → protein+fat only ────
  if (band === 'easy' && hours < 2.5) {
    const tlProtein = leadMins >= 90 ? 25 : 20;
    const tlFat = leadMins >= 90 ? 15 : 10;
    return {
      carbs: 0, protein: tlProtein, fat: tlFat, timing: `${leadLabel} (train-low)`,
      carbGkg: '0', trainLow: true,
      why: [
        `<b>Train-low pre-meal (IF ${ifDisplay}, ${leadLabel}).</b> Stellingwerff/Impey 2018: commencing low-intensity sessions (IF &lt;0.65) with reduced muscle glycogen amplifies AMPK/PGC-1α signalling for mitochondrial biogenesis. Burke 2011 periodised model: "fuel for the work required" — adaptation sessions don't need topped-up glycogen.`,
        `<b>Protein ${tlProtein}g + fat ${tlFat}g:</b> Provides satiety and amino acid availability without spiking insulin or refilling glycogen. Phillips & van Loon 2011: pre-exercise protein supports MPS regardless of CHO availability.${leadMins >= 90 ? ' With ' + leadLabel + ' lead time, slightly larger portion is fine — ample time for gastric clearance.' : ''}`,
        leadMins >= 120
          ? `<b>Examples (${leadLabel} window):</b> Omelette with cheese, avocado toast (no honey), Greek yogurt with nuts, protein shake with nut butter + berries (low sugar).`
          : leadMins >= 60
            ? `<b>Examples (${leadLabel} window):</b> 2 eggs scrambled, small handful of almonds, Greek yogurt (no honey), protein shake with nut butter.`
            : `<b>Examples (${leadLabel} window):</b> Small protein shake, handful of nuts, slice of cheese. Keep it minimal — limited digestion time.`,
        `<b>Caveats:</b> Only if (1) you haven't done &gt;2 train-low sessions this week, (2) you slept well, (3) you're not in a heavy deficit. If in doubt, fuel normally with carbs.`,
      ]
    };
  }

  // ── 2D pre-fuel matrix: duration × intensity ──────────────
  // CHO dose scales with BOTH ride demand and available lead time
  //
  // Lead time scaling (Thomas 2016: 1–4 g/kg over 1–4h):
  //   30 min  → ×0.5  (small, fast-absorbing only)
  //   60 min  → ×0.75
  //   90 min  → ×1.0  (baseline)
  //   120 min → ×1.25
  //   180 min → ×1.5  (full pre-load meal)

  const leadScale = leadMins <= 30 ? 0.5
    : leadMins <= 60 ? 0.75
    : leadMins <= 90 ? 1.0
    : leadMins <= 120 ? 1.25
    : 1.5;

  // Base CHO g/kg from duration × intensity matrix
  let baseCarbGkg;
  if (hours < 1.5) {
    baseCarbGkg = band === 'hard' ? 1.0 : 0.5;
  } else if (hours < 2.5) {
    baseCarbGkg = band === 'hard' ? 1.5 : band === 'moderate' ? 0.8 : 0.5;
  } else if (hours < 3.5) {
    baseCarbGkg = band === 'hard' ? 2.0 : band === 'moderate' ? 1.0 : 0.8;
  } else {
    baseCarbGkg = band === 'hard' ? 2.5 : band === 'moderate' ? 1.2 : 1.0;
  }

  // Scale by lead time
  const carbGkg = Math.round(baseCarbGkg * leadScale * 10) / 10;
  const carbs = Math.round(carbGkg * weight);

  // Protein & fat scale with available time (more time → can handle more)
  let protein, fat;
  if (leadMins >= 120) {
    protein = band === 'hard' ? 15 : 15;
    fat = band === 'hard' ? 10 : 10;
  } else if (leadMins >= 60) {
    protein = band === 'hard' ? 10 : 10;
    fat = band === 'hard' ? 5 : 5;
  } else {
    // 30 min — keep protein/fat minimal
    protein = 5;
    fat = 0;
  }

  const why = [];

  if (band === 'hard') {
    why.push(`<b>Carbs ${carbGkg.toFixed(1)} g/kg (${carbs}g) — intensity-boosted (IF ${ifDisplay}), scaled for ${leadLabel} lead time (×${leadScale}).</b> Burke 2011 & Thomas 2016: pre-exercise CHO should top off liver glycogen and augment muscle glycogen when high depletion is expected. At IF &gt;0.80, CHO oxidation rate is maximal (Hawley & Leckey 2015) — arriving with full stores is critical. Base dose ${baseCarbGkg.toFixed(1)} g/kg × ${leadScale} lead-time factor = ${carbGkg.toFixed(1)} g/kg.`);
  } else {
    why.push(`<b>Carbs ${carbGkg.toFixed(1)} g/kg (${carbs}g) (IF ${ifDisplay}), scaled for ${leadLabel} lead time (×${leadScale}).</b> Thomas 2016 ACSM: 1–4 g/kg over 1–4h pre-exercise. Base dose ${baseCarbGkg.toFixed(1)} g/kg × ${leadScale} lead-time factor = ${carbGkg.toFixed(1)} g/kg.`);
  }

  // Timing-specific food advice
  if (leadMins >= 120) {
    why.push(`<b>Protein ${protein}g, fat ${fat}g:</b> With ${leadLabel}, there's enough time for gastric emptying of a mixed meal. Moderate protein supports pre-exercise amino acid availability (Phillips & van Loon 2011). Small amount of fat is OK — Burke 2011: "low fat, low fibre" but not zero.`);
    why.push(`<b>Examples (${leadLabel} window):</b> Rice + chicken + honey, pasta with light sauce, porridge with banana + honey, toast with eggs + jam, rice bowl with protein. A proper meal — just keep fibre low.`);
  } else if (leadMins >= 60) {
    why.push(`<b>Protein ${protein}g, fat ${fat}g:</b> At ${leadLabel}, keep protein moderate and fat low. Burke 2011: "low fat, low fibre, moderate protein." Enough time for a light snack but not a full meal.`);
    why.push(`<b>Examples (${leadLabel} window):</b> Banana + honey + white toast, rice cake with jam, energy bar + banana, white bread with jam + small protein shake.`);
  } else {
    why.push(`<b>Protein ~5g, fat 0g:</b> At ${leadLabel}, both slow gastric emptying. Keep minimal to reduce GI distress risk — Burke et al. 2011: the window is too short for significant protein or fat.`);
    why.push(`<b>Examples (${leadLabel} window):</b> 1–2 gels, banana + honey, dates, white bread + jam, sports drink. Quick-digesting CHO only — avoid anything with fat, fibre, or complex protein.`);
  }

  return { carbs, protein, fat, timing: leadLabel, carbGkg: carbGkg.toFixed(1), trainLow: false, why };
}
// ────────────────────────────────────────────────────────────────
//  2D FUELING MATRIX — Duration × Intensity (Jeukendrup 2014 +
//  Hawley & Leckey 2015 substrate-dependence + Stellingwerff/
//  Impey 2018 train-low)
//
//  intensityFactor here is NP-based IF, NOT avg-power-based.
//  For planned rides: estimatedIF = avgPower × VI / FTP
//  For actuals: real IF from Intervals.icu
// ────────────────────────────────────────────────────────────────

function getIntensityBand(intensityFactor) {
  if (intensityFactor < 0.65) return 'easy';
  if (intensityFactor <= 0.80) return 'moderate';
  return 'hard';
}

function generateIntraFuel(durationSec, weight, intensityFactor, sessionType) {
  const hours = durationSec / 3600;
  const band = getIntensityBand(intensityFactor || 0);
  const ifDisplay = intensityFactor ? intensityFactor.toFixed(2) : '?';

  // ── Under 45 min ──────────────────────────────────────────
  if (hours < 0.75) {
    if (band === 'hard') {
      // Short + hard: mouth rinse has central benefit (Chambers et al.)
      return {
        rate: 0, total: 0, sodium: 0, fluid: '400–600 ml/h', trainLow: false,
        why: [
          `<b>Mouth rinse recommended (IF ${ifDisplay}).</b> At &lt;45 min, glycogen stores are sufficient for substrate — but at high intensity (IF &gt;0.80), CHO mouth rinsing improves performance ~2–3% via central/oropharyngeal pathways (Chambers et al.; Jeukendrup 2014). Swirl 4–6% CHO solution for 5–10 sec.`,
          `<b>Fluid:</b> Sawka 2007 ACSM: drink to thirst for short efforts.`
        ]
      };
    }
    return {
      rate: 0, total: 0, sodium: 0, fluid: 0, trainLow: false,
      why: [`<b>No fueling needed.</b> Muscle glycogen stores (~400–500g when full) are sufficient for efforts under 45 min (Burke et al. 2011; Jeukendrup 2014 decision tree: events &lt;30 min → no CHO).`]
    };
  }

  // ── 45 min – 1h 15min ────────────────────────────────────
  if (hours < 1.25) {
    if (band === 'hard') {
      // Hard short effort: bump to 30 g/h — substrate demand is real
      return {
        rate: 30, total: Math.round(30 * Math.max(0, hours - 0.5)), sodium: '300–500 mg/L', fluid: '400–750 ml/h', trainLow: false,
        why: [
          `<b>CHO rate: 30 g/h (IF ${ifDisplay} — intensity bump).</b> Standard duration ladder says mouth rinse only at 45–75 min (Jeukendrup 2014). But at IF &gt;0.80, CHO oxidation rate is high — Hawley & Leckey 2015: above ~75% VO₂max, Type II fibres are heavily recruited and CHO is the dominant substrate. Ingesting 30 g/h supports both the central pathway and substrate delivery. Single-source CHO is fine.`,
          `<b>Fluid:</b> Sawka 2007: 400–750 ml/h depending on sweat rate.`
        ]
      };
    }
    // Easy or moderate: standard mouth-rinse protocol
    const trainLow = band === 'easy' && (sessionType === 'easy');
    const result = {
      rate: 0, total: 0, sodium: 0, fluid: '400–600 ml/h', trainLow,
      why: [
        `<b>Mouth rinse only (IF ${ifDisplay}).</b> Jeukendrup 2014 & Burke 2011: for 30–75 min sustained efforts, swirling a 4–6% CHO solution in the mouth for 5–10 sec improves performance ~2–3% via central/oropharyngeal pathways (Chambers et al. fMRI studies showed brain reward-centre activation). No need to swallow — substrate isn't the limiter at this duration.`,
        `<b>Fluid:</b> Sawka 2007 ACSM: 400–800 ml/h depending on sweat rate and conditions. Drink to thirst for short efforts.`
      ]
    };
    if (trainLow) {
      result.why.push(`<b>Train-low option:</b> This is a low-intensity session (IF ${ifDisplay}). You can skip the mouth rinse and ride on water + electrolytes only for adaptation benefit — Stellingwerff/Impey 2018: low-CHO availability during Z2 work amplifies AMPK/PGC-1α signalling for mitochondrial biogenesis. Only if you haven't done &gt;2 low-CHO sessions this week and tomorrow isn't a key session.`);
    }
    return result;
  }

  // ── 1h 15min+ : 2D matrix lookup ─────────────────────────
  let rate, sodium, fluid;
  const why = [];
  let trainLow = false;

  // Matrix: rows = duration bins, columns = intensity bands
  //
  //  Duration         | Easy (IF<0.65)      | Moderate (0.65-0.80) | Hard (IF>0.80)
  //  1h15 – 2h        | train-low OR 30 g/h | 30 g/h               | 60 g/h
  //  2h – 2h30        | 30 g/h (or TL if Z2)| 60 g/h               | 80 g/h
  //  2h30 – 3h30      | 60 g/h              | 80 g/h               | 90 g/h
  //  > 3h30           | 80 g/h              | 90 g/h               | 90+ g/h (gut-trained)

  if (hours < 2) {
    if (band === 'hard') {
      rate = 60; sodium = '500–700'; fluid = '500–750';
      why.push(`<b>CHO rate: 60 g/h (IF ${ifDisplay} — intensity bump).</b> Standard duration ladder: 30 g/h for 1–2h (Burke 2011). But at IF &gt;0.80, CHO oxidation rate is significantly elevated — Hawley & Leckey 2015: above the crossover point (~75% VO₂max), Type II fibre recruitment makes CHO the dominant substrate. Bumped one tier to match glycogen demand. Consider multi-transportable CHO (2:1 glu:fru) at 60 g/h to avoid SGLT1 saturation (Jeukendrup 2014).`);
    } else if (band === 'easy') {
      rate = 30; sodium = '300–500'; fluid = '400–750';
      trainLow = true;
      why.push(`<b>CHO rate: 30 g/h (IF ${ifDisplay}).</b> Burke et al. 2011 duration ladder: 1–2h events → 30–60 g/h. At low intensity, 30 g/h is sufficient — fat oxidation contributes a larger share of substrate below the crossover point (Hawley & Leckey 2015). Single-source CHO OK.`);
      why.push(`<b>Train-low option:</b> At IF ${ifDisplay}, this is a Z2 session — you can ride on water + electrolytes only for adaptation benefit. Stellingwerff/Impey 2018: low-CHO availability during endurance work amplifies AMPK-dependent signalling for mitochondrial biogenesis (glycogen threshold hypothesis). Only do this if: (1) you haven't done &gt;2 low-CHO sessions this week, (2) tomorrow isn't a hard or long session, (3) you're not in a heavy deficit. If in doubt, fuel normally.`);
    } else {
      rate = 30; sodium = '300–500'; fluid = '400–750';
      why.push(`<b>CHO rate: 30 g/h (IF ${ifDisplay}).</b> Burke et al. 2011 duration ladder: 1–2h events → 30–60 g/h. At moderate intensity, 30 g/h is sufficient. Single-source CHO OK (glucose, maltodextrin, sucrose) — SGLT1 transporter handles up to ~60 g/h before saturation (Jeukendrup 2014).`);
    }
  } else if (hours < 2.5) {
    if (band === 'hard') {
      rate = 80; sodium = '500–700'; fluid = '600–800';
      why.push(`<b>CHO rate: 80 g/h (IF ${ifDisplay} — intensity bump).</b> Standard duration ladder: 60 g/h for 2–2.5h (Burke 2011). At IF &gt;0.80, glycogen depletion is accelerated — Hawley & Leckey 2015: CHO oxidation rate at race intensity can exceed 3 g/min from endogenous stores. Bumped one tier. Multi-transportable CHO required (2:1 glu:fru) — above 60 g/h, SGLT1 alone saturates at ~1.0–1.1 g/min (Jeukendrup 2014).`);
    } else if (band === 'easy') {
      rate = 30; sodium = '300–500'; fluid = '400–750';
      trainLow = true;
      why.push(`<b>CHO rate: 30 g/h (IF ${ifDisplay}).</b> At low intensity over 2h, fat oxidation covers a larger share of substrate demand. 30 g/h provides baseline exogenous CHO without excess. Single-source CHO is fine.`);
      why.push(`<b>Train-low option:</b> At IF ${ifDisplay}, this qualifies as a Z2 endurance session. Stellingwerff/Impey 2018: performing this in a low-CHO state (water + electrolytes only) amplifies AMPK/PGC-1α signalling. Burke 2011 periodised model: "fuel for the work required" — if the goal is adaptation, not performance, low-CHO is the tool. Caveats: no more than 2–3 low-CHO sessions per week; don't train-low before a key session; monitor for under-fuelling signs.`);
    } else {
      rate = 60; sodium = '500–700'; fluid = '500–750';
      why.push(`<b>CHO rate: 60 g/h (IF ${ifDisplay}).</b> Burke et al. 2011: 2–3h events → up to 60 g/h. This is the practical ceiling for single-source CHO — the intestinal SGLT1 glucose transporter saturates at ~1.0–1.1 g/min (Jeukendrup 2014). Above 60 g/h with single-source, unabsorbed CHO draws water into the gut lumen → GI distress. Consider multi-transportable (2:1 glu:fru) if gut tolerates it.`);
    }
  } else if (hours < 3.5) {
    if (band === 'hard') {
      rate = 90; sodium = '600–800'; fluid = '≥750';
      why.push(`<b>CHO rate: 90 g/h (IF ${ifDisplay} — intensity bump).</b> Standard duration ladder: 80 g/h for 2.5–3.5h (Jeukendrup 2014). At IF &gt;0.80 over this duration, glycogen depletion is severe — Hawley & Leckey 2015: sustained high-intensity work is CHO-dependent regardless of training status. Pushed to 90 g/h; consider 100+ if gut-trained. Multi-transportable CHO required (2:1 glu:fru).`);
    } else if (band === 'easy') {
      rate = 60; sodium = '500–700'; fluid = '500–750';
      why.push(`<b>CHO rate: 60 g/h (IF ${ifDisplay}).</b> Even at low intensity, 2.5h+ duration means meaningful glycogen depletion. 60 g/h is the minimum responsible rate at this duration. Single-source CHO is acceptable at 60 g/h; multi-transportable preferred. Cermak & van Loon 2013: CHO during exercise improves endurance performance ~2%.`);
    } else {
      rate = 80; sodium = '500–700'; fluid = '600–800';
      why.push(`<b>CHO rate: 80 g/h (IF ${ifDisplay}).</b> Jeukendrup 2014 decision tree: events &gt;2.5h → 60–90 g/h with multi-transportable CHO required. Fructose is absorbed via the GLUT5 transporter (independent of SGLT1), raising total absorption capacity to ~1.5–1.75 g/min. Use 2:1 glucose:fructose ratio. Cermak & van Loon 2013 meta-analysis: CHO during exercise improves TT performance ~2%.`);
    }
  } else {
    // > 3.5h
    if (band === 'hard') {
      rate = 90; sodium = '600–800'; fluid = '≥750';
      why.push(`<b>CHO rate: 90+ g/h — push to 100–120 if gut-trained (IF ${ifDisplay}).</b> At IF &gt;0.80 over 3.5h+, this is maximum substrate demand. Jeukendrup 2014: gut-trained athletes can achieve absorption rates of 1.75 g/min (105 g/h) vs untrained ~1.1 g/min. Multi-transportable CHO required (2:1 glu:fru). Hawley & Leckey 2015: at this intensity and duration, glycogen is the rate-limiting factor — maximise exogenous supply.`);
    } else if (band === 'easy') {
      rate = 80; sodium = '500–700'; fluid = '600–800';
      why.push(`<b>CHO rate: 80 g/h (IF ${ifDisplay}).</b> Long easy ride — fat oxidation contributes significantly below the crossover point (Hawley & Leckey 2015), but at 3.5h+ even low-intensity work depletes glycogen substantially. 80 g/h is the responsible floor. Multi-transportable CHO required (2:1 glu:fru). Burke 2011: 8–12 g/kg/d for very high volume training.`);
    } else {
      rate = 90; sodium = '600–800'; fluid = '≥750';
      why.push(`<b>CHO rate: 90 g/h (push to 100–120 if gut-trained) (IF ${ifDisplay}).</b> Jeukendrup 2014: gut-trained athletes can achieve absorption rates of 1.75 g/min (105 g/h) vs untrained ~1.1 g/min. Gut training is a 4–6 week protocol of progressively higher CHO on long rides — it upregulates SGLT1/GLUT5 transporters and speeds gastric emptying. Multi-transportable CHO required (2:1 glu:fru).`);
    }
  }

  why.push(`<b>Sodium: ${sodium} mg/L.</b> Sawka 2007 ACSM position stand: 300–700 mg/L for events &gt;2h. Replaces sweat sodium losses (typical sweat [Na+] = 20–80 mmol/L). Prevents exercise-associated hyponatraemia (EAH) and aids fluid absorption.`);
  why.push(`<b>Fluid: ${fluid} ml/h.</b> Sawka 2007: target ≤2% body mass loss. Typical range 400–800 ml/h; higher in heat. Gastric emptying tops out at ~1.0–1.2 L/h.`);
  why.push(`<b>Timing:</b> Start eating from min 20–30. Eat every 20–30 min to maintain steady exogenous CHO oxidation. Don't wait until you feel depleted — by then glycogen is already compromised (Hawley & Leckey 2015).`);

  const fuelingHours = Math.max(0, hours - 0.5);
  const total = Math.round(rate * fuelingHours);

  return { rate, total, sodium: `${sodium} mg/L`, fluid: `${fluid} ml/h`, trainLow, why };
}

function generatePostFuel(durationSec, weight, intensityFactor) {
  const hours = durationSec / 3600;
  if (hours < 0.75) return null;

  const proteinGkg = 0.3;
  const protein = Math.round(proteinGkg * weight);
  let carbGkg;
  if (hours < 1.5) carbGkg = 0.8;
  else if (hours < 2.5) carbGkg = 1.0;
  else carbGkg = 1.2;

  if (intensityFactor > 0.80) carbGkg = Math.min(1.2, carbGkg + 0.1);

  const carbs = Math.round(carbGkg * weight);

  const why = [
    `<b>Carbs ${carbGkg.toFixed(1)} g/kg (${carbs}g):</b> Burke et al. 2011 recovery protocol: 1.0–1.2 g/kg/h for the first 4h when next session is &lt;8h away. ${hours >= 2.5 ? 'After ' + hours.toFixed(1) + 'h, glycogen is heavily depleted — the recovery window matters most here.' : 'Even with a longer turnaround, early refueling accelerates glycogen resynthesis.'} Glycogen synthase is most active immediately post-exercise (Ivy et al. 1988).`,
    `<b>Protein ${proteinGkg} g/kg (${protein}g):</b> Phillips & van Loon 2011: 0.3 g/kg per meal maximally stimulates muscle protein synthesis (MPS) via the leucine/mTORC1 pathway. Each dose needs ~2.5–3g leucine — achievable from 25–30g whey or 35–50g plant protein. Co-ingesting protein with CHO also modestly improves glycogen resynthesis when CHO is sub-optimal (Burke 2011).`,
    `<b>Timing: within 30–60 min.</b> Thomas 2016 ACSM: post-exercise protein + CHO within the first hour. MPS response is elevated for ~24h post-exercise, but the immediate window is when glycogen synthase activity peaks and the muscle is most insulin-sensitive.`,
  ];

  if (hours >= 2.5) {
    why.push(`<b>Appetite note:</b> Prolonged exercise often suppresses appetite (exercise-induced anorexia). If you can't face solid food, start with liquid: chocolate milk, smoothie, or recovery shake. Follow with a real meal within 90 min. Don't skip — tomorrow's session pulls from today's recovery.`);
  }
  why.push(`<b>Examples:</b> 500ml chocolate milk + scoop whey + banana + dried fruit. Or recovery shake + rice cake + honey.`);

  return { carbs, protein, timing: 'Within 30–60 min', carbGkg: carbGkg.toFixed(1), why };
}

function generatePreload(tomorrowClassified, dayOfWeek) {
  if (!tomorrowClassified || tomorrowClassified.type === 'rest') return null;

  const hours = tomorrowClassified.durationSec / 3600;
  const items = [];

  if (tomorrowClassified.type === 'long' || hours >= 2.5) {
    items.push('<b>Why preload:</b> Glycogen replenishment takes 24–48h (Burke 2011). Tonight\'s dinner partly fuels tomorrow\'s ride — the "fuel for the work required" model (Stellingwerff/Burke/Impey 2018).');
    items.push('Dinner should be carb-forward, low fibre, moderate protein, low fat. Thomas 2016 ACSM: pre-event meal = low fat, low fibre, familiar foods. No creamy pasta, fried food, or high-fibre legume bowls.');
    if (hours >= 3.5) {
      items.push('If craving 2nd dinner / late snack: white rice + honey, sourdough + jam, or banana + cereal. Aim for an extra 60–80 g carb. Burke 2011: 24–36h at 10–12 g/kg/d maximises glycogen for events &gt;90 min.');
    }
    items.push('Salt dinner generously if tomorrow is long or hot — Sawka 2007: pre-exercise sodium loading improves fluid retention and reduces hyponatraemia risk.');
    items.push('Prep bottles + bars + breakfast before bed. Lights out early.');
  } else if (tomorrowClassified.type === 'hard') {
    items.push('<b>Why preload:</b> Burke 2011 periodised model — high-intensity sessions need high CHO availability to be productive. Glycogen-depleted threshold work = junk training.');
    items.push('Dinner carb-forward to top up glycogen. Don\'t add extra fat or fibre late.');
    items.push('If hungry before bed: carbs > protein at this point (honey, toast, banana). Van Loon: pre-sleep casein (30–40g) supports overnight MPS if you want protein too.');
  } else {
    items.push('Normal dinner. Hydrate to pale urine before bed.');
  }

  const label = `Tomorrow preload · ${dayOfWeek} = ${tomorrowClassified.session}`;
  return { label, items };
}

//  DATA FETCHING
// ════════════════════════════════════════════════════════════════
let currentMonday = getMonday(todayISO());
let cachedData = {};

async function fetchWeekData(monday) {
  const sunday = addDays(monday, 6);
  const key = monday;
  const thisMonday = getMonday(todayISO());
  // Don't cache current week — activities get completed throughout the day
  if (cachedData[key] && key !== thisMonday) return cachedData[key];
  const resp = await fetch(`/api/intervals?oldest=${monday}&newest=${sunday}`);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${resp.status}`);
  }
  const data = await resp.json();
  cachedData[key] = data;
  return data;
}

let activeView = 'plan';

function renderApp() {
  if (activeView === 'settings') renderSettings();
  else loadAndRenderPlan();
}

async function loadAndRenderPlan() {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading-msg">Loading from Intervals.icu…</div>';
  try {
    const data = await fetchWeekData(currentMonday);
    renderPlan(data);
  } catch (e) {
    app.innerHTML = `${renderHeader()}<div class="error-msg"><b>Could not load data from Intervals.icu.</b><br>${e.message}<br><br>Check your API key in Vercel environment variables.</div>`;
  }
}

function renderHeader() {
  return `<header>
    <h1>Fuel Plan</h1>
    <p class="subtle">Auto-generated from Intervals.icu · powered by research</p>
    <div class="nav-bar">
      <button class="nav-btn ${activeView === 'plan' ? 'active' : ''}" onclick="switchView('plan')">Plan</button>
      <button class="nav-btn ${activeView === 'settings' ? 'active' : ''}" onclick="switchView('settings')">Settings</button>
    </div>
  </header>`;
}

function renderPlan(data) {
  const app = document.getElementById('app');
  const settings = loadSettings();
  const baseline = getOffBikeBaseline(settings);
  const today = todayISO();
  const dates = weekDates(currentMonday);
  const sunday = dates[6];

  const days = [];
  for (let i = 0; i < 7; i++) {
    const date = dates[i];
    const evts = data.events ? data.events[date] : null;
    const acts = data.activities ? data.activities[date] : null;
    const hasActual = acts && acts.totalEnergy > 0;
    // If we have actual ride data, classify from that (events may be removed post-completion)
    // Otherwise fall back to planned events
    const classified = hasActual
      ? classifyFromActivity(acts, settings)
      : classifySession(evts ? evts : []);

    let rideKcal, avgWatts, durationSec, source;
    if (hasActual) {
      rideKcal = acts.totalEnergy;
      avgWatts = acts.avgWatts;
      durationSec = acts.totalTime;
      source = 'actual';
    } else if (classified.durationSec > 0) {
      durationSec = classified.durationSec;
      avgWatts = Math.round(classified.intensityFactor * settings.ftp);
      rideKcal = Math.round(avgWatts * durationSec / 1000);
      source = 'estimate';
      if (evts) {
        const totalJoules = evts.reduce((s, e) => s + (e.joules || 0), 0);
        if (totalJoules > 0) { rideKcal = Math.round(totalJoules / 1000); source = 'planned'; }
      }
    } else {
      rideKcal = 0; avgWatts = 0; durationSec = 0; source = 'none';
    }

    // Compute NP-based IF for fueling matrix
    // For actuals: use real IF from ICU if available
    // For planned/estimated: estimate NP from avg power × VI, then IF = estimatedNP / FTP
    let fuelingIF;
    if (hasActual && acts.icu_intensity) {
      fuelingIF = acts.icu_intensity;
    } else if (hasActual && avgWatts > 0) {
      // Actual ride but no IF — estimate using VI
      fuelingIF = (avgWatts * (settings.variabilityIndex || 1.18)) / settings.ftp;
    } else if (avgWatts > 0) {
      // Planned/estimated: avgWatts is the planned avg power
      fuelingIF = (avgWatts * (settings.variabilityIndex || 1.18)) / settings.ftp;
    } else {
      fuelingIF = classified.intensityFactor;
    }

    const macros = computeDayMacros(rideKcal, durationSec, settings);
    days.push({ date, classified, rideKcal, avgWatts, durationSec, source, macros, hasActual, evts, acts, fuelingIF });
  }

  let totalHours = days.reduce((s, d) => s + d.durationSec / 3600, 0);
  let totalKcal = days.reduce((s, d) => s + d.macros.kcal, 0);
  let avgKcal = Math.round(totalKcal / 7);
  const thisMonday = getMonday(todayISO());

  let html = renderHeader();

  html += `<div class="week-nav">
    <button onclick="changeWeek(-1)">‹</button>
    <span class="week-label">${formatDateLong(currentMonday)} — ${formatDateLong(sunday)}${currentMonday === thisMonday ? ' · this week' : ''}</span>
    <button onclick="changeWeek(1)">›</button>
  </div>`;

  html += `<div class="metrics">
    <div class="metric"><p class="lbl">FTP</p><p class="val">${settings.ftp}<span class="unit"> W</span></p></div>
    <div class="metric"><p class="lbl">Daily kcal avg</p><p class="val">${fmt(avgKcal)}<span class="unit"> kcal</span></p></div>
    <div class="metric"><p class="lbl">Protein floor</p><p class="val">${settings.proteinFloor}<span class="unit"> g/day</span></p></div>
    <div class="metric"><p class="lbl">Working weight</p><p class="val">${settings.weight}<span class="unit"> kg</span></p></div>
    <div class="metric"><p class="lbl">Cycling load</p><p class="val">${totalHours.toFixed(1)}<span class="unit"> hr</span></p></div>
    <div class="metric"><p class="lbl">Off-bike baseline</p><p class="val">${fmt(baseline)}<span class="unit"> kcal</span></p></div>
  </div>`;

  html += `<div class="calib">
    <b>Auto-generated from Intervals.icu.</b> Each ride is costed: <code>ride_kcal = avg_power × duration_s ÷ 1000</code>.
    Fueling rate uses a 2D matrix (duration × intensity). For planned rides, IF is estimated as <code>avg_power × VI(${settings.variabilityIndex}) ÷ FTP</code>; for completed rides, real IF from ICU is used when available.
    Deficit target: ~${settings.deficitPerDay} kcal/day. Carbs are the adjustment lever — protein (${settings.proteinFloor}g) and fat stay fixed.
    Fuel protocols follow Jeukendrup 2014 / Burke 2011 / Hawley & Leckey 2015 / Stellingwerff & Impey 2018.
  </div>`;

  html += `<div class="refresh-bar">
    <button class="refresh-btn" id="icu-btn" onclick="refreshData()" type="button"><span class="icon">↻</span> Refresh</button>
    <span class="refresh-status" id="icu-status">Data auto-loaded from Intervals.icu.</span>
  </div>`;

  html += `<div class="install-bar" id="install-bar" onclick="installPWA()">Install on home screen</div>`;
  html += `<h2>Day-by-day</h2>`;

  days.forEach((day, idx) => {
    const isPast = day.date < today;
    const isToday = day.date === today;
    const c = day.classified;
    const hours = day.durationSec / 3600;

    let classes = 'day';
    if (isPast) classes += ' past';
    if (isToday) classes += ' today';

    html += `<article class="${classes}" data-date="${day.date}">`;
    html += `<div class="day-head">`;
    html += `<span class="day-name">${dayName(day.date)}</span>`;
    html += `<span class="day-date">${formatDate(day.date)}</span>`;
    html += `<span class="badge ${c.type}">${c.label}</span>`;
    if (isToday) html += `<span class="pill today-pill">TODAY</span>`;
    if (day.hasActual) html += `<span class="pill actual-pill">✓ actual</span>`;
    html += `</div>`;

    html += `<p class="session">${c.session}${hours > 0 ? ' · ' + hours.toFixed(1) + ' h' : ''}</p>`;

    if (day.rideKcal > 0) {
      const deficit = day.macros.tdee - day.macros.kcal;
      const isActual = day.source === 'actual';
      const sourceLabel = isActual ? 'Intervals.icu' : (day.source === 'planned' ? 'Planned' : 'Estimate');
      let powerText = `${sourceLabel}: `;
      if (day.avgWatts) powerText += `${day.avgWatts} W avg × ${fmt(day.durationSec)} s ÷ 1000 = `;
      powerText += `<b>${fmt(day.rideKcal)} kcal ride</b> · TDEE ${fmt(day.macros.tdee)} · Eat ${fmt(day.macros.kcal)} (~${fmt(deficit)} kcal deficit)`;
      html += `<p class="power-line${isActual ? ' actual' : ''}">${powerText}</p>`;
    }

    const mc = day.macros;
    html += `<div class="macro-row">`;
    html += `<div class="macro"><p class="m-lbl">kcal</p><p class="m-val">${fmt(mc.kcal)}</p></div>`;
    html += `<div class="macro"><p class="m-lbl">Carbs</p><p class="m-val">${fmt(mc.carbs)}<span class="m-unit"> g</span></p></div>`;
    html += `<div class="macro"><p class="m-lbl">Protein</p><p class="m-val">${fmt(mc.protein)}<span class="m-unit"> g</span></p></div>`;
    html += `<div class="macro"><p class="m-lbl">Fat</p><p class="m-val">${fmt(mc.fat)}<span class="m-unit"> g</span></p></div>`;
    html += `</div>`;
    if (mc.macroWhy) {
      html += `<div class="note"><p style="margin:0;font-size:12px;line-height:1.5">${mc.macroWhy}</p></div>`;
    }

    if (hours >= 0.75) {
      const pre = generatePreFuel(day.durationSec, settings.weight, day.fuelingIF, settings.preWorkoutMins);
      if (pre) {
        html += `<div class="fuel-block pre${pre.trainLow ? ' train-low' : ''}">`;
        html += `<p class="fuel-label">Pre-workout · ${pre.timing}${day.fuelingIF ? ' · IF ' + day.fuelingIF.toFixed(2) : ''}</p>`;
        html += `<p class="fuel-macro">${pre.carbs} g C · ${pre.protein} g P · ${pre.fat} g F</p>`;
        pre.why.forEach(w => html += `<p class="fuel-detail">${w}</p>`);
        html += `</div>`;
      }

      const intra = generateIntraFuel(day.durationSec, settings.weight, day.fuelingIF, day.classified.type);
      html += `<div class="fuel-block intra">`;
      html += `<p class="fuel-label">During workout${intra.rate > 0 ? ' · ' + intra.rate + ' g/h target' : ''}${day.fuelingIF ? ' · IF ' + day.fuelingIF.toFixed(2) : ''}</p>`;
      if (intra.total > 0) {
        html += `<p class="fuel-macro">~${intra.total} g CHO total · ${intra.sodium} sodium · ${intra.fluid} fluid</p>`;
      }
      intra.why.forEach(w => html += `<p class="fuel-detail">${w}</p>`);
      html += `</div>`;

      const post = generatePostFuel(day.durationSec, settings.weight, day.classified.intensityFactor);
      if (post) {
        html += `<div class="fuel-block post">`;
        html += `<p class="fuel-label">Post-workout · ${post.timing}</p>`;
        html += `<p class="fuel-macro">${post.carbs} g C (${post.carbGkg} g/kg) · ${post.protein} g P (0.3 g/kg)</p>`;
        post.why.forEach(w => html += `<p class="fuel-detail">${w}</p>`);
        html += `</div>`;
      }
    }

    const nextDay = idx < 6 ? days[idx + 1] : null;
    if (nextDay) {
      const nextDayName = dayName(nextDay.date);
      const preload = generatePreload(nextDay.classified, nextDayName);
      if (preload) {
        html += `<div class="preload"><p class="preload-title">${preload.label}</p><ul>`;
        preload.items.forEach(item => html += `<li>${item}</li>`);
        html += `</ul></div>`;
      }
    }

    html += `</article>`;
  });

  html += `<div class="foot">
    <p style="margin:0"><b>Troubleshooting:</b> Dragging mid-week → add 200 kcal/day (carbs). Weight stalling → pull rest-day carbs by 50g.
    Tracking weighs on mood → simplify to protein + ride fuel only. Sick → pause deficit, eat maintenance.</p>
  </div>`;

  app.innerHTML = html;

  const todayCard = document.querySelector('.day.today');
  if (todayCard) setTimeout(() => todayCard.scrollIntoView({ behavior: 'smooth', block: 'start' }), 300);
}

// ════════════════════════════════════════════════════════════════
//  SETTINGS VIEW
// ════════════════════════════════════════════════════════════════
function renderSettings() {
  const app = document.getElementById('app');
  const s = loadSettings();
  const baseline = getOffBikeBaseline(s);

  let html = renderHeader();
  html += `<h2>Settings</h2>`;
  html += `<p class="subtle">These values drive all macro and fuel calculations. Stored in your browser.</p>`;

  html += `<div class="settings-grid">
    <div class="setting-field"><label>FTP (W)</label><input type="number" id="s-ftp" value="${s.ftp}" step="1"><span class="hint">Functional threshold power</span></div>
    <div class="setting-field"><label>Weight (kg)</label><input type="number" id="s-weight" value="${s.weight}" step="0.5"><span class="hint">Working bodyweight</span></div>
    <div class="setting-field"><label>BMR (kcal/day)</label><input type="number" id="s-bmr" value="${s.bmr}" step="5"><span class="hint">Basal metabolic rate</span></div>
    <div class="setting-field"><label>NEAT multiplier</label><input type="number" id="s-neat" value="${s.neatMultiplier}" step="0.05" min="1.0" max="1.6"><span class="hint">Off-bike activity factor (1.10–1.40)</span></div>
    <div class="setting-field"><label>Variability Index</label><input type="number" id="s-vi" value="${s.variabilityIndex}" step="0.01" min="1.0" max="1.50"><span class="hint">NP/AP ratio — typical: 1.05 flat/steady, 1.15–1.25 hilly/variable. Check your last 20 rides in ICU.</span></div>
    <div class="setting-field"><label>Pre-workout lead time</label><select id="s-pretime">
      <option value="30"${s.preWorkoutMins == 30 ? ' selected' : ''}>30 min — gels/simple sugar only</option>
      <option value="60"${s.preWorkoutMins == 60 ? ' selected' : ''}>1 hour — light snack</option>
      <option value="90"${s.preWorkoutMins == 90 ? ' selected' : ''}>1.5 hours — small meal</option>
      <option value="120"${s.preWorkoutMins == 120 ? ' selected' : ''}>2 hours — full meal</option>
      <option value="180"${s.preWorkoutMins == 180 ? ' selected' : ''}>3 hours — big pre-load meal</option>
    </select><span class="hint">How much time you typically have before training. Adjusts food type, portion size, and composition.</span></div>
    <div class="setting-field" style="grid-column:1/-1">
      <label>Daily deficit strategy</label>
      <select id="s-deficit-preset" onchange="onDeficitPresetChange()">
        <option value="0"${s.deficitPerDay === 0 ? ' selected' : ''}>Maintenance — 0 kcal/day (no deficit)</option>
        <option value="270"${s.deficitPerDay === 270 ? ' selected' : ''}>Conservative — 270 kcal/day (~0.25 kg/wk)</option>
        <option value="400"${s.deficitPerDay === 400 ? ' selected' : ''}>Moderate — 400 kcal/day (~0.35 kg/wk)</option>
        <option value="540"${s.deficitPerDay === 540 ? ' selected' : ''}>Aggressive — 540 kcal/day (~0.5 kg/wk)</option>
        <option value="custom"${![0,270,400,540].includes(s.deficitPerDay) ? ' selected' : ''}>Custom</option>
      </select>
      <input type="number" id="s-deficit" value="${s.deficitPerDay}" step="10" class="deficit-custom${![0,270,400,540].includes(s.deficitPerDay) ? ' show' : ''}">
      <div class="deficit-why" id="deficit-why"></div>
    </div>
    <div class="setting-field"><label>Protein floor (g/day)</label><input type="number" id="s-protein" value="${s.proteinFloor}" step="5"><span class="hint">Min daily protein (~2 g/kg during deficit)</span></div>
    <div class="setting-field"><label>Protein long day (g)</label><input type="number" id="s-proteinLong" value="${s.proteinLongDay}" step="5"><span class="hint">Protein on 3.5h+ ride days</span></div>
  </div>`;

  html += `<div class="derived">
    <b>Derived values:</b><br>
    Off-bike baseline = BMR × NEAT = ${fmt(s.bmr)} × ${s.neatMultiplier} = <b>${fmt(baseline)} kcal/day</b><br>
    TDEE on ride days = ${fmt(baseline)} + ride_kcal (based on avg power)<br>
    Fueling IF (planned rides) = avg_power × VI ÷ FTP = avg_power × ${s.variabilityIndex} ÷ ${s.ftp}<br>
    Protein per kg = ${(s.proteinFloor / s.weight).toFixed(2)} g/kg/d
  </div>`;

  html += `<div class="settings-actions">
    <button class="btn-save" onclick="saveSettingsFromForm()">Save</button>
    <button class="btn-reset" onclick="resetSettings()">Reset to defaults</button>
  </div>`;

  html += `<div class="calib" style="margin-top:20px">
    <b>Research basis:</b> TDEE formula follows power-based costing (kJ = kcal at ~22–25% gross efficiency).
    Protein per Phillips & van Loon 2011: 1.2–2.0 g/kg/d, 0.3 g/kg per meal, 4–5 meals/day.
    Carb periodization per Burke 2011 / Stellingwerff: fuel for the work required.
    Deficit of ~270 kcal/day targets ~0.25 kg/week fat loss while preserving lean mass.
  </div>`;

  app.innerHTML = html;
  onDeficitPresetChange(); // populate the research note on load
}

const DEFICIT_INFO = {
  '0': '<b>Maintenance (0 kcal/day):</b> No weight loss — eat at TDEE. Use during race week, recovery blocks, or illness. Thomas 2016 ACSM: energy availability should stay ≥45 kcal/kg FFM/day for optimal health and performance.',
  '270': '<b>Conservative (270 kcal/day ≈ 0.25 kg/wk):</b> Garthe et al. 2011 found that slower weight loss (~0.7% BW/week) preserved significantly more lean mass and strength vs faster loss. At 81 kg this is ~0.3% BW/week — safest option during heavy training blocks. Recommended for build/peak phases.',
  '400': '<b>Moderate (400 kcal/day ≈ 0.35 kg/wk):</b> Roughly 0.5% BW/week. Hector & Phillips 2018 review: up to 0.5% BW/week is sustainable for trained athletes when protein is ≥2 g/kg/d. Acceptable during base phase or lower-volume weeks. Monitor power output — if FTP drops, reduce deficit.',
  '540': '<b>Aggressive (540 kcal/day ≈ 0.5 kg/wk):</b> Approaching 0.7% BW/week. Garthe 2011: this rate showed measurable lean mass and strength loss in athletes. Only use in off-season or very low-volume periods. Risk of RED-S increases — Thomas 2016: energy availability below 30 kcal/kg FFM/day impairs hormonal, metabolic, and bone health. Time-limit to 4–6 weeks max.',
  'custom': '<b>Custom deficit:</b> Set your own value. Research guideline: stay below ~0.7% body weight loss per week (Garthe 2011) and keep energy availability above 30 kcal/kg FFM/day (Loucks 2004, Thomas 2016) to avoid RED-S.'
};

function onDeficitPresetChange() {
  const sel = document.getElementById('s-deficit-preset');
  const input = document.getElementById('s-deficit');
  const info = document.getElementById('deficit-why');
  if (!sel || !input || !info) return;

  const val = sel.value;
  if (val === 'custom') {
    input.classList.add('show');
  } else {
    input.classList.remove('show');
    input.value = val;
  }
  info.innerHTML = DEFICIT_INFO[val] || '';
}

function saveSettingsFromForm() {
  const s = {
    ftp: parseInt(document.getElementById('s-ftp').value) || DEFAULTS.ftp,
    weight: parseFloat(document.getElementById('s-weight').value) || DEFAULTS.weight,
    bmr: parseInt(document.getElementById('s-bmr').value) || DEFAULTS.bmr,
    neatMultiplier: parseFloat(document.getElementById('s-neat').value) || DEFAULTS.neatMultiplier,
    variabilityIndex: parseFloat(document.getElementById('s-vi').value) || DEFAULTS.variabilityIndex,
    preWorkoutMins: parseInt(document.getElementById('s-pretime').value) || DEFAULTS.preWorkoutMins,
    deficitPerDay: parseInt(document.getElementById('s-deficit').value) || DEFAULTS.deficitPerDay,
    proteinFloor: parseInt(document.getElementById('s-protein').value) || DEFAULTS.proteinFloor,
    proteinLongDay: parseInt(document.getElementById('s-proteinLong').value) || DEFAULTS.proteinLongDay,
  };
  saveSettings(s);
  cachedData = {};
  switchView('plan');
}

function resetSettings() {
  localStorage.removeItem('fuelSettings');
  renderSettings();
}

// ════════════════════════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════════════════════════
function switchView(view) { activeView = view; renderApp(); }
function changeWeek(delta) { currentMonday = addDays(currentMonday, delta * 7); loadAndRenderPlan(); }
function refreshData() { delete cachedData[currentMonday]; loadAndRenderPlan(); }

// ════════════════════════════════════════════════════════════════
//  PWA Install
// ════════════════════════════════════════════════════════════════
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  const bar = document.getElementById('install-bar');
  if (bar) bar.style.display = 'block';
});
function installPWA() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then(() => { deferredInstallPrompt = null; const bar = document.getElementById('install-bar'); if (bar) bar.style.display = 'none'; });
}

// ════════════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════════════
renderApp();
</script>
